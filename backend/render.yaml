services:
  - type: web
    name: aion-ai-research-backend
    runtime: python
    region: oregon
    rootDir: backend
    buildCommand: pip install --no-cache-dir .
    startCommand: uvicorn src.api.server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENV
        value: production
      - key: DISABLE_TINYTEX
        value: "1"
      - key: PYTHON_VERSION
        value: "3.12.0"
